name: Test

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['22', '24']
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Display Node.js information
        run: |
          echo "==== Node.js Information ===="
          node --version
          npm --version
          echo "============================"
      
      - name: Install dependencies
        run: npm ci --prefer-offline
      
      - name: Run linter
        run: npm run lint

      - name: Run assistant tests
        run: npm run test:assistant -- --test-reporter=spec
